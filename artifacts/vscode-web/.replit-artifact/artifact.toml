kind = "web"
previewPath = "/"
title = "VS Code Web"
version = "1.0.0"
id = "artifacts/vscode-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24569

[services.development]
run = "pnpm --filter @workspace/vscode-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vscode-web", "run", "build" ]
publicDir = "artifacts/vscode-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24569"
BASE_PATH = "/"
