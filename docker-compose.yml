# VS Code Web Replica — Backend Microservices
#
# Architecture:
#   1. Core API & WebSocket Routing — TypeScript (Node.js) on port 3001
#   2. Code Execution & Sandboxing — Go on port 3002
#   3. Heavy File Search / Indexing — Rust on port 3003
#   4. AI Inline Completion (Copilot) — Python on port 3004
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose up core-api    # Start only core API
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop all services

version: '3.8'

services:
  # ─── Core API & WebSocket (TypeScript / Node.js) ─────────────────────────
  core-api:
    build:
      context: ./mini-services/core-api
      dockerfile: Dockerfile
    container_name: vscode-core-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - SANDBOX_URL=http://sandbox:3002
      - SEARCH_URL=http://search:3003
      - COPILOT_URL=http://copilot:3004
    depends_on:
      - sandbox
      - search
      - copilot
    networks:
      - vscode-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── Code Execution & Sandboxing (Go) ────────────────────────────────────
  sandbox:
    build:
      context: ./backend/sandbox
      dockerfile: Dockerfile
    container_name: vscode-sandbox
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox-tmp:/tmp/sandbox
    networks:
      - vscode-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # Security: limit resources for the sandbox service itself
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  # ─── Heavy File Search / Indexing (Rust) ──────────────────────────────────
  search:
    build:
      context: ./backend/search
      dockerfile: Dockerfile
    container_name: vscode-search
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - WORKSPACE_ROOT=/workspace
    volumes:
      - workspace-data:/workspace:ro
    networks:
      - vscode-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M

  # ─── AI Inline Completion / Copilot (Python) ─────────────────────────────
  copilot:
    build:
      context: ./backend/copilot
      dockerfile: Dockerfile
    container_name: vscode-copilot
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - PYTHONUNBUFFERED=1
    networks:
      - vscode-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M

  # ─── Next.js Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vscode-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_CORE_API_URL=http://core-api:3001
      - NEXT_PUBLIC_SANDBOX_URL=http://sandbox:3002
      - NEXT_PUBLIC_SEARCH_URL=http://search:3003
      - NEXT_PUBLIC_COPILOT_URL=http://copilot:3004
    depends_on:
      - core-api
    networks:
      - vscode-net
    restart: unless-stopped

  # ─── Caddy Reverse Proxy ─────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: vscode-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - core-api
    networks:
      - vscode-net
    restart: unless-stopped

volumes:
  sandbox-tmp:
    driver: local
  workspace-data:
    driver: local

networks:
  vscode-net:
    driver: bridge
