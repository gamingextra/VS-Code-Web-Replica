name: Deploy to GitHub Pages

on:
  push:
    branches:
      - feature/code-server-enhancements
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          # Check if Pages is already enabled
          STATUS=$(gh api "repos/$REPO/pages" 2>/dev/null || echo "NOT_FOUND")
          if echo "$STATUS" | grep -q "NOT_FOUND"; then
            echo "Enabling GitHub Pages with GitHub Actions source..."
            gh api "repos/$REPO/pages" \
              --method POST \
              --field source='{"branch":"feature/code-server-enhancements","path":"/docs"}' \
              --field build_type=workflow || true
            echo "Pages enabled. Note: You may need to verify this in Settings > Pages."
          else
            echo "Pages already enabled."
          fi

  build:
    runs-on: ubuntu-latest
    needs: enable-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
